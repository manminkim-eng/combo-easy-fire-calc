<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>겸용 펌프 용량 계산서 — 간이스프링클러 + 옥내소화전</title>
<link rel="manifest" href="manifest.json"/>
<meta name="theme-color" content="#7c3aed"/>
<meta name="description" content="겸용 펌프 용량 계산서 — 간이스프링클러 + 옥내소화전 통합 소방시설 설계"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="default"/>
<meta name="apple-mobile-web-app-title" content="겸용(간이+옥내)"/>
<link rel="apple-touch-icon" href="icons/apple-touch-icon.png"/>
<link rel="icon" type="image/png" sizes="32x32" href="icons/favicon-32.png"/>
<link rel="icon" type="image/png" sizes="16x16" href="icons/favicon-16.png"/>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700;800;900&family=Noto+Sans+Mono:wght@400;600;700&family=Orbitron:wght@700;900&display=swap" rel="stylesheet"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Noto Sans KR',sans-serif;background:#f1f5f9;-webkit-font-smoothing:antialiased;}
input,select,button,td,th,div,span,p,h1,h2,label{font-family:'Noto Sans KR',sans-serif !important;}
@media print{
  @page{
    size:A4 portrait;
    margin:14mm 12mm 22mm 14mm;
    @bottom-right{
      content:"MANMIN-Ver2.0";
      font-family:'Orbitron',sans-serif;
      font-size:8pt;
      font-weight:700;
      color:#9ca3af;
      letter-spacing:0.08em;
    }
  }
  body{background:white !important;}
  #no-print{display:none !important;}
  .no-print{display:none !important;}
  #report-zone{box-shadow:none !important;border:none !important;padding:0 !important;margin:0 !important;border-radius:0 !important;}
  .page-break{page-break-before:always;}
  .print-section{break-inside:avoid;page-break-inside:avoid;}
  #dev-stamp{display:block !important;text-align:right;font-size:9px;color:#94a3b8;margin-top:8px;}
}
#dev-stamp{display:none !important;}
.pwa-install-banner{background:linear-gradient(135deg,#7c3aed 0%,#4c1d95 100%);border:1px solid rgba(255,255,255,.2);animation:slideUp .4s ease-out;}
@keyframes slideUp{from{transform:translateY(100%);opacity:0}to{transform:translateY(0);opacity:1}}

/* ════════════════════════════════════════════
   계산식 안내 FAB
════════════════════════════════════════════ */
.formula-fab{
  position:fixed;bottom:84px;right:18px;z-index:1200;
  background:linear-gradient(135deg,#1d4ed8,#4c1d95);
  color:white;border:none;border-radius:16px;
  padding:11px 15px;cursor:pointer;
  box-shadow:0 4px 20px rgba(29,78,216,0.55);
  display:flex;flex-direction:column;align-items:center;gap:2px;
  font-family:'Noto Sans KR',sans-serif;line-height:1.3;
  transition:transform .15s,box-shadow .15s;
}
.formula-fab:hover{transform:translateY(-3px);box-shadow:0 8px 28px rgba(29,78,216,0.7);}
.formula-fab:active{transform:translateY(0);}

/* ════════════════════════════════════════════
   계산식 안내 오버레이 & 모달
════════════════════════════════════════════ */
.fml-overlay{
  position:fixed;inset:0;z-index:9000;
  background:rgba(0,0,0,0.6);backdrop-filter:blur(5px);
  display:flex;align-items:center;justify-content:center;
  padding:16px;
  animation:fmlFadeIn .2s ease-out;
}
@keyframes fmlFadeIn{from{opacity:0}to{opacity:1}}

.fml-box{
  background:#ffffff;border-radius:20px;
  width:100%;max-width:820px;
  max-height:calc(100vh - 32px);
  display:flex;flex-direction:column;overflow:hidden;
  box-shadow:0 28px 72px rgba(0,0,0,0.35);
  animation:fmlSlideUp .25s cubic-bezier(0.34,1.56,0.64,1);
}
@keyframes fmlSlideUp{from{transform:translateY(28px);opacity:0}to{transform:translateY(0);opacity:1}}

/* 헤더 */
.fml-head{
  background:linear-gradient(135deg,#0f172a,#1e3a5f,#1d4ed8);
  color:white;padding:18px 22px 0;flex-shrink:0;
}
.fml-head-top{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:14px;}
.fml-close-btn{
  background:rgba(255,255,255,0.12);border:none;color:white;
  border-radius:50%;width:34px;height:34px;cursor:pointer;
  font-size:18px;display:flex;align-items:center;justify-content:center;
  transition:background .15s;flex-shrink:0;
}
.fml-close-btn:hover{background:rgba(255,255,255,0.25);}

/* 탭 바 (모달 내부) */
.fml-tab-bar{
  display:flex;gap:0;overflow-x:auto;
  scrollbar-width:none;-webkit-overflow-scrolling:touch;
}
.fml-tab-bar::-webkit-scrollbar{display:none;}
.fml-tab-btn{
  padding:9px 18px;border:none;background:transparent;
  color:rgba(255,255,255,0.6);font-size:12px;font-weight:700;
  font-family:'Noto Sans KR',sans-serif;cursor:pointer;
  border-bottom:3px solid transparent;white-space:nowrap;
  transition:all .15s;flex-shrink:0;
}
.fml-tab-btn.active{color:#fff;border-bottom-color:#60a5fa;}
.fml-tab-btn:hover:not(.active){color:rgba(255,255,255,0.85);}

/* 바디 */
.fml-body{
  overflow-y:auto;padding:20px 22px 24px;
  -webkit-overflow-scrolling:touch;flex:1;
}
.fml-body::-webkit-scrollbar{width:6px;}
.fml-body::-webkit-scrollbar-thumb{background:#c7d2fe;border-radius:3px;}
.fml-body::-webkit-scrollbar-track{background:transparent;}

/* 섹션 */
.fml-sec{margin-bottom:20px;}
.fml-sec-title{
  font-size:11px;font-weight:800;letter-spacing:.07em;text-transform:uppercase;
  margin-bottom:10px;display:flex;align-items:center;gap:7px;
  border-left:3px solid currentColor;padding-left:9px;
}
/* 카드 */
.fml-card{
  background:#f8fafc;border:1px solid #e2e8f0;
  border-radius:10px;padding:12px 14px;margin-bottom:8px;
}
.fml-card-title{font-size:12px;font-weight:700;color:#334155;margin-bottom:6px;}
.fml-eq{
  display:block;font-family:'Noto Sans Mono',monospace;
  font-size:12.5px;font-weight:700;
  background:#f1f5f9;border-radius:6px;
  padding:7px 11px;margin:6px 0;
  word-break:break-all;line-height:1.6;color:#1e40af;
}
.fml-eq.hi{background:#fffbeb;color:#92400e;}
.fml-note{font-size:10px;color:#6b7280;margin-top:5px;line-height:1.75;}

/* 2열 카드 그리드 */
.fml-grid-2{display:grid;grid-template-columns:1fr 1fr;gap:10px;}

/* ── 반응형 ── */
@media(max-width:640px){
  .fml-overlay{padding:0;align-items:flex-end;}
  .fml-box{
    border-radius:20px 20px 0 0;
    max-height:93vh;
    animation:fmlSlideUpMobile .3s cubic-bezier(0.34,1.2,0.64,1);
  }
  @keyframes fmlSlideUpMobile{from{transform:translateY(100%)}to{transform:translateY(0)}}
  .fml-body{padding:16px 16px 32px;}
  .fml-head{padding:14px 16px 0;}
  .fml-grid-2{grid-template-columns:1fr;}
  .fml-tab-btn{padding:9px 14px;font-size:11px;}
  .formula-fab{bottom:76px;right:14px;padding:10px 13px;}
}
@media(min-width:641px) and (max-width:1024px){
  .fml-box{max-width:90vw;max-height:88vh;}
}
@media(min-width:1025px){
  .fml-box{max-width:860px;}
}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel" data-presets="env,react">
const { useState, useMemo, useEffect } = React;

/* ══════════════════════════════════════════════════════════════
   공통 상수
══════════════════════════════════════════════════════════════ */
const FLOW_PER_HYDRANT = 130;   // 옥내소화전 개당 방사량 (ℓ/min)
const H_NOZZLE         = 17;    // 옥내소화전 노즐 환산수두 (m)
const H_WATER_TIME     = 20;    // 옥내소화전 방사시간 (min)

const SP_NOZZLE        = 10;    // 간이스프링클러 헤드 최소방수압 환산수두 (m) — 0.1 MPa

const PIPE_CONFIG = {
  SCH10:{label:"배관용 탄소강관 KS D3507 (백관)",       shortLabel:"KS D3507",      C:120,
         inner:{25:27.6,32:36.2,40:42.1,50:53.2,65:69.0,80:81.0,100:105.3,125:130.1,150:155.5,200:204.6}},
  SCH40:{label:"압력배관용 탄소강관 KS D3562 (흑관)",   shortLabel:"KS D3562",      C:120,
         inner:{25:26.6,32:35.1,40:40.9,50:52.5,65:62.7,80:77.9,100:102.3,125:128.2,150:154.1,200:202.7}},
  STS:  {label:"배관용 스테인리스강관 KS D3595",        shortLabel:"STS",           C:150,
         inner:{25:27.6,32:36.8,40:42.8,50:54.8,65:70.0,80:85.0,100:108.2,125:133.4,150:160.0,200:210.0}},
  CPVC: {label:"내식성 CPVC관 (소방용)",               shortLabel:"CPVC",          C:150,
         inner:{25:26.6,32:35.1,40:40.9,50:52.5,65:62.7,80:79.4,100:101.6,125:127.0,150:154.1,200:203.2}},
};
const FITTING_EQ={
  25:[0.9,0.54,1.5,0.27,0.18,7.5,4.5,2.0],  32:[1.2,0.72,1.8,0.36,0.24,10.5,5.4,2.5],
  40:[1.5,0.90,2.1,0.45,0.30,13.8,6.5,3.1], 50:[2.1,1.20,3.0,0.60,0.39,16.5,8.4,4.0],
  65:[2.4,1.30,3.6,0.75,0.48,19.5,10.2,4.6],80:[3.0,1.80,4.5,0.90,0.60,24.0,12.0,5.7],
  100:[4.2,2.40,6.3,1.20,0.81,37.5,16.5,7.6],125:[5.1,3.00,7.5,1.50,0.99,42.0,21.0,10.0],
  150:[6.0,3.60,9.0,1.80,1.20,49.5,24.0,12.0],200:[6.5,3.70,14.0,4.00,1.40,70.0,33.0,15.0],
};
const HOSE_TYPES={
  1:{label:"40mm 아마호스",     rate:26, fixed:null},
  2:{label:"40mm 고무내장호스", rate:12, fixed:null},
  3:{label:"50mm 아마호스",     rate:7,  fixed:null},
  4:{label:"50mm 고무내장호스", rate:3,  fixed:null},
  5:{label:"25mm 호스릴",       rate:0,  fixed:14},
};
const BASE_EASY_TYPES=[
  {key:"A2", label:"일반형 — 2개 헤드 × 50 ℓ/min × 10분 (일반 용도)",                    n:2, q:50, t:10},
  {key:"A5", label:"특수형 — 5개 헤드 × 50 ℓ/min × 20분 (영 별표4 제1호마목 2가 또는 6·8)", n:5, q:50, t:20},
  {key:"AP", label:"주차장 — 표준반응형 1개 × 80 ℓ/min × 10분 (NFTC 103 준용)",           n:1, q:80, t:10},
];
const TRANS_TYPE={1:{label:"전동기 직결",k:1.1},2:{label:"전동기 이외의 원동기",k:1.15}};
const H_PIPE_SIZES=[40,50,65,80,100,125,150,200];
const SP_PIPE_SIZES=[25,32,40,50,65,80,100,125,150,200];
const PUMP_SIZES=[40,50,65,80,100,125,150];
const HP_STEPS=[3,5,7.5,10,15,20,25,30,40,50,60,75,100,125,150,200];
const BD="1px solid #d1d5db";

function calcFriction(Q,D,pipeType){
  if(!Q||!D)return 0;
  const cfg=PIPE_CONFIG[pipeType]||PIPE_CONFIG.SCH10;
  const id=(cfg.inner[D]||D)/1000;
  const Qm=Q/1000/60;
  return 10.67*Math.pow(Qm,1.852)/(Math.pow(cfg.C,1.852)*Math.pow(id,4.87));
}
function calcVelocity(Q,D,pipeType){
  if(!Q||!D)return 0;
  const cfg=PIPE_CONFIG[pipeType]||PIPE_CONFIG.SCH10;
  const id=(cfg.inner[D]||D)/1000;
  const Qm=Q/1000/60;
  return Qm/(Math.PI/4*id*id);
}
function nextHP(kw){const hp=kw*1.341;for(const h of HP_STEPS){if(h>=hp)return h;}return Math.ceil(hp/5)*5;}
const f2=v=>isNaN(v)?"-":Number(v).toFixed(2);
const f3=v=>isNaN(v)?"-":Number(v).toFixed(3);
const ff=(v,d=1)=>isNaN(v)?"-":Number(v).toFixed(d);

/* ── 공통 UI 컴포넌트 ── */
function LabelEl({children}){return <div style={{fontSize:11,fontWeight:700,color:"#374151",marginBottom:5,letterSpacing:"0.02em"}}>{children}</div>;}
function Sel({val,onChange,children,style={}}){
  return <select value={val} onChange={e=>onChange(e.target.value)}
    style={{width:"100%",padding:"8px 12px",borderRadius:8,border:BD,background:"white",fontSize:13,outline:"none",...style}}>{children}</select>;
}
function InpNum({val,onChange,unit,min,max}){
  return <div style={{display:"flex",alignItems:"center",gap:6}}>
    <input type="number" value={val} min={min} max={max}
      onChange={e=>onChange(+(e.target.value))}
      style={{width:"100%",padding:"8px 12px",borderRadius:8,border:BD,background:"white",fontSize:13,outline:"none"}}/>
    {unit&&<span style={{fontSize:12,color:"#6b7280",whiteSpace:"nowrap"}}>{unit}</span>}
  </div>;
}
function EffInp({val,onChange}){
  return <div style={{display:"flex",alignItems:"center",gap:6}}>
    <input type="number" value={val} min={10} max={80} step={1}
      onChange={e=>{const v=Math.min(80,Math.max(10,parseInt(e.target.value)||10));onChange(v);}}
      style={{width:"100%",padding:"8px 12px",borderRadius:8,border:BD,background:"white",fontSize:13,outline:"none"}}/>
    <span style={{fontSize:12,color:"#6b7280",whiteSpace:"nowrap"}}>%</span>
  </div>;
}
function Box({title,children,color="#1e3a5f"}){
  return <div style={{background:"white",borderRadius:12,boxShadow:"0 1px 4px rgba(0,0,0,0.08)",marginBottom:16,overflow:"hidden"}}>
    <div style={{background:color,color:"white",padding:"10px 18px",fontSize:13,fontWeight:700,letterSpacing:"0.04em"}}>{title}</div>
    <div style={{padding:16}}>{children}</div>
  </div>;
}
function Card({label,value,unit,formula,bc}){
  const cols={blue:["#eff6ff","#1d4ed8"],orange:["#fff7ed","#c2410c"],green:["#f0fdf4","#15803d"],red:["#fef2f2","#b91c1c"],amber:["#fffbeb","#b45309"]};
  const [bg,tc]=cols[bc]||["#f8fafc","#374151"];
  return <div style={{background:bg,borderRadius:10,padding:"12px 14px",border:`1px solid ${tc}22`}}>
    <div style={{fontSize:10,color:"#6b7280",marginBottom:4}}>{label}</div>
    <div style={{fontSize:20,fontWeight:900,color:tc,fontFamily:"'Noto Sans Mono',monospace",lineHeight:1.1}}>
      {value}<span style={{fontSize:11,color:"#9ca3af",marginLeft:4}}>{unit}</span>
    </div>
    {formula&&<div style={{fontSize:9,color:"#9ca3af",marginTop:4,fontFamily:"'Noto Sans Mono',monospace"}}>{formula}</div>}
  </div>;
}
function PipeTable({segs,setSegs,pipeType,pipeSizes,velLimit,velLimit2,label,velLabel,flowOpts}){
  const HDRS=["NO","유량\n(ℓ/min)","관경\n(A)","직관\n(m)","90°\nElbow","45°\nElbow","분류\nTee","직류\nTee","Gate\nV/V","Ball\nV/V","Angle\nV/V","Check\nV/V","상당직관\n(m)","마찰계수\n(m/100m)","손실수두\n(m)","유속\n(m/s)","×"];
  const upd=(i,k,v)=>setSegs(p=>{const n=[...p];n[i]={...n[i],[k]:v};return n;});
  const add=()=>setSegs(p=>[...p,{flow:flowOpts?flowOpts[0]:50,dia:50,len:10,e90:0,e45:0,teeB:0,teeS:0,gate:0,ball:0,angle:0,check:0}]);
  const del=i=>setSegs(p=>p.filter((_,j)=>j!==i));
  return <Box title={label} color="#334155">
    <div style={{overflowX:"auto"}}>
      <table style={{width:"100%",borderCollapse:"collapse",fontSize:11}}>
        <colgroup>
          <col style={{width:"3%"}}/><col style={{width:"7%"}}/><col style={{width:"6%"}}/><col style={{width:"6%"}}/>
          <col style={{width:"5%"}}/><col style={{width:"5%"}}/><col style={{width:"5%"}}/><col style={{width:"5%"}}/>
          <col style={{width:"5%"}}/><col style={{width:"5%"}}/><col style={{width:"5%"}}/><col style={{width:"5%"}}/>
          <col style={{width:"7%"}}/><col style={{width:"8%"}}/><col style={{width:"7%"}}/><col style={{width:"6%"}}/><col style={{width:"2%"}}/>
        </colgroup>
        <thead>
          <tr style={{background:"#1e3a5f",color:"white"}}>
            {HDRS.map((h,i)=><th key={i} style={{border:BD,padding:"5px 2px",textAlign:"center",whiteSpace:"pre-line",lineHeight:1.3,fontSize:9,fontWeight:700}}>{h}</th>)}
          </tr>
        </thead>
        <tbody>
          {segs.map((s,i)=>{
            const eq=FITTING_EQ[s.dia]||FITTING_EQ[100];
            const fl=s.e90*eq[0]+s.e45*eq[1]+s.teeB*eq[2]+s.teeS*eq[3]+s.gate*eq[4]+s.ball*eq[5]+s.angle*eq[6]+s.check*eq[7];
            const tl=(s.len||0)+fl;
            const fric=calcFriction(s.flow,s.dia,pipeType);
            const hl=fric*tl/100;
            const vel=calcVelocity(s.flow,s.dia,pipeType);
            const lim=velLimit||6;
            const lim2=velLimit2||10;
            const vW=vel>lim2?"⚠":vel>lim?"⚡":"";
            const num=(k,v)=><input type="number" value={v} onChange={e=>upd(i,k,+(e.target.value))}
              style={{width:"100%",padding:"2px",textAlign:"center",fontSize:10,border:"1px solid #e5e7eb",borderRadius:4,fontFamily:"'Noto Sans Mono',monospace",background:"white"}}/>;
            return <tr key={i} style={{background:i%2?"#f9fafb":"white"}}>
              <td style={{border:BD,padding:"4px 2px",textAlign:"center",fontSize:10,fontWeight:700}}>{i+1}</td>
              <td style={{border:BD,padding:"2px"}}>
                {flowOpts
                  ? <select value={s.flow} onChange={e=>upd(i,"flow",+e.target.value)}
                      style={{width:"100%",padding:"2px",fontSize:10,border:"1px solid #e5e7eb",borderRadius:4,fontFamily:"'Noto Sans Mono',monospace",background:"white",textAlign:"center"}}>
                      {flowOpts.map(f=><option key={f} value={f}>{f}</option>)}
                    </select>
                  : num("flow",s.flow)
                }
              </td>
              <td style={{border:BD,padding:"2px"}}>
                <select value={s.dia} onChange={e=>upd(i,"dia",+e.target.value)}
                  style={{width:"100%",padding:"2px",fontSize:10,border:"none",background:"transparent",fontFamily:"'Noto Sans KR',sans-serif",outline:"none"}}>
                  {pipeSizes.map(d=><option key={d} value={d}>{d}</option>)}
                </select>
              </td>
              <td style={{border:BD,padding:"2px"}}>{num("len",s.len)}</td>
              {["e90","e45","teeB","teeS","gate","ball","angle","check"].map(k=>(
                <td key={k} style={{border:BD,padding:"2px"}}>{num(k,s[k])}</td>
              ))}
              <td style={{border:BD,padding:"4px 2px",textAlign:"center",fontSize:10,fontFamily:"'Noto Sans Mono',monospace"}}>{f3(fl)}</td>
              <td style={{border:BD,padding:"4px 2px",textAlign:"center",fontSize:10,fontFamily:"'Noto Sans Mono',monospace",color:"#c2410c",fontWeight:700}}>{f3(fric)}</td>
              <td style={{border:BD,padding:"4px 2px",textAlign:"center",fontSize:10,fontFamily:"'Noto Sans Mono',monospace",color:"#1d4ed8",fontWeight:700}}>{f3(hl)}</td>
              <td style={{border:BD,padding:"4px 2px",textAlign:"center",fontSize:10,fontFamily:"'Noto Sans Mono',monospace",color:vW?"#dc2626":"#374151",fontWeight:vW?700:400}}>{f2(vel)}{vW?" "+vW:""}</td>

function App(){
  const [tab,setTab]=useState(0);
  const [showFormula, setShowFormula] = useState(false);
  const [proj,setProj]=useState({name:"만민 건축사 신사옥 신축공사 현장",designer:"김만민",date:new Date().toISOString().slice(0,10)});

  /* 간이스프링클러 상태 */
  const [spSys,setSpSys]=useState({baseType:"A2",actualHead:20,pipeType:"SCH10"});
  const ssSP=(k,v)=>setSpSys(p=>({...p,[k]:v}));
  const [spSegs,setSpSegs]=useState([
    {flow:100,dia:50,len:20,e90:2,e45:0,teeB:1,teeS:0,gate:1,ball:0,angle:0,check:1},
    {flow:50, dia:40,len:15,e90:1,e45:0,teeB:0,teeS:1,gate:0,ball:0,angle:0,check:0},
  ]);

  /* 옥내소화전 상태 */
  const [hSys,setHSys]=useState({hydrants:3,actualHead:78,hoseLen:30,hoseType:2,pipeType:"SCH10"});
  const ssH=(k,v)=>setHSys(p=>({...p,[k]:v}));
  const [hSegs,setHSegs]=useState([
    {flow:390,dia:100,len:30,e90:3,e45:2,teeB:1,teeS:12,gate:2,ball:0,angle:2,check:1},
    {flow:260,dia:100,len:35,e90:0,e45:0,teeB:1,teeS:0, gate:0,ball:0,angle:0,check:0},
    {flow:130,dia:80, len:6, e90:0,e45:0,teeB:1,teeS:0, gate:0,ball:0,angle:0,check:0},
    {flow:130,dia:50, len:20,e90:0,e45:0,teeB:1,teeS:0, gate:0,ball:0,angle:1,check:0},
  ]);

  /* 겸용 펌프 파라미터 */
  const [cPump,setCPump]=useState({pumpDia:100,pumpEff:60,transType:1});
  const ssCp=(k,v)=>setCPump(p=>({...p,[k]:v}));

  const[installPrompt,setInstallPrompt]=useState(null);
  const[showInstallBanner,setShowInstallBanner]=useState(false);
  useEffect(()=>{const h=(e)=>{e.preventDefault();setInstallPrompt(e);if(!window.matchMedia('(display-mode:standalone)').matches)setShowInstallBanner(true);};window.addEventListener('beforeinstallprompt',h);return()=>window.removeEventListener('beforeinstallprompt',h);},[]);
  const handleInstall=async()=>{if(!installPrompt)return;installPrompt.prompt();const r=await installPrompt.userChoice;if(r.outcome==='accepted')console.log('[PWA] 설치 완료');setInstallPrompt(null);setShowInstallBanner(false);};

  /* ── 간이스프링클러 계산 ── */
  const SP=useMemo(()=>{
    const btype=BASE_EASY_TYPES.find(x=>x.key===spSys.baseType)||BASE_EASY_TYPES[0];
    const A=btype.n;
    const q=btype.q;
    const T=btype.t;
    const Clpm=A*q;
    const D=A*q*T/1000;
    const E=+spSys.actualHead;
    let F=0;
    spSegs.forEach(s=>{
      const eq=FITTING_EQ[s.dia]||FITTING_EQ[100];
      const fl=s.e90*eq[0]+s.e45*eq[1]+s.teeB*eq[2]+s.teeS*eq[3]+s.gate*eq[4]+s.ball*eq[5]+s.angle*eq[6]+s.check*eq[7];
      const tl=(s.len||0)+fl;
      F+=calcFriction(s.flow,s.dia,spSys.pipeType)*tl/100;
    });
    const G=SP_NOZZLE;
    const I=(E+F+G)*0.1;
    const J=Math.ceil(E+F+G+I);
    return {A,q,T,Clpm,D,E,F,G,I,J,btype};
  },[spSys,spSegs]);

  /* ── 옥내소화전 계산 ── */
  const H=useMemo(()=>{
    const A=Math.min(5,Math.max(1,hSys.hydrants|0));
    const Clpm=A*FLOW_PER_HYDRANT;
    const D=Clpm*H_WATER_TIME/1000;
    let F=0;
    hSegs.forEach(s=>{
      const eq=FITTING_EQ[s.dia]||FITTING_EQ[100];
      const fl=s.e90*eq[0]+s.e45*eq[1]+s.teeB*eq[2]+s.teeS*eq[3]+s.gate*eq[4]+s.ball*eq[5]+s.angle*eq[6]+s.check*eq[7];
      const tl=(s.len||0)+fl;
      F+=calcFriction(s.flow,s.dia,hSys.pipeType)*tl/100;
    });
    const hose=HOSE_TYPES[hSys.hoseType]||HOSE_TYPES[2];
    const G=hose.fixed!=null?hose.fixed:hose.rate*hSys.hoseLen/100;
    const E=+hSys.actualHead;
    const sub=E+F+G+H_NOZZLE;
    const I=sub*0.1;
    const J=Math.ceil(sub+I);
    return {A,Clpm,D,E,F,G,I,J,hose};
  },[hSys,hSegs]);

  /* ── 겸용 펌프 계산 ── */
  const CP=useMemo(()=>{
    const Clpm=SP.Clpm+H.Clpm;           // 유량 합산
    const J=Math.max(SP.J,H.J);          // 전양정: 더 높은 쪽
    const D=SP.D+H.D;                    // 수원 합산
    const M=Clpm/1000;

                      ["A","간이스프링클러헤드 기준개수",SP.A,"개",`NFTC 103A §2.1.1.2 — ${SP.btype.label.replace(/\s*\(영\s*별표4[^)]*\)/g,'').trim()}`],
                      ["B","헤드 1개당 방사량",SP.q,"ℓ/min","NFTC 103A §2.2.1 (간이헤드 50 ℓ/min / 주차장 80 ℓ/min)"],
                      ["C","펌프 토출량",SP.Clpm,"ℓ/min",`C = A×B = ${SP.A}×${SP.q}`],
                      ["C-1","방수 지속시간",SP.T,"분","NFTC 103A §2.1.1.2 (일반 10분 / 특수 20분)"],
                      ["D","수원 용량",`${f3(SP.D)}`,"m³",`D = A×B×T÷1000 = ${SP.A}×${SP.q}×${SP.T}÷1000 = ${f3(SP.D)} m³`],
                      ["E","실양정 (h₁)",ff(SP.E),"m","설계 도면 기준"],
                      ["F","배관 마찰손실 (h₂)",f3(SP.F),"m","Hazen-Williams 공식 (배관 구간 마찰손실 합산)"],
                      ["G","헤드 최소방수압 환산수두 (h₃)",SP.G,"m","최소방수압 0.1 MPa → 10 m"],
                      ["I","안전율",f3(SP.I),"m","(E+F+G)×10%"],
                      ["J","전양정",SP.J,"m","올림 적용"],
                    ].map(([no,lbl,val,unit,bas])=>(
                      <tr key={no} style={{background:"white"}}>
                        <td style={{border:BD,padding:"5px 10px",textAlign:"center",fontWeight:700,fontFamily:"'Noto Sans Mono',monospace",color:"#b45309",whiteSpace:"nowrap"}}>{no}</td>
                        <td style={{border:BD,padding:"5px 12px",fontSize:11,whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{lbl}</td>
                        <td style={{border:BD,padding:"5px 12px",textAlign:"right",fontFamily:"'Noto Sans Mono',monospace",fontWeight:700,whiteSpace:"nowrap"}}>{val}</td>
                        <td style={{border:BD,padding:"5px 8px",textAlign:"center",fontSize:11,color:"#6b7280",whiteSpace:"nowrap"}}>{unit}</td>
                        <td style={{border:BD,padding:"5px 12px",fontSize:10,color:"#6b7280",whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{bas}</td>
                      </tr>
                    ))}
                  </tbody>
                </table>
              </div>
            </div>

            {/* Ⅱ. 옥내소화전 */}
            <div className="print-section" style={{border:"2px solid #b91c1c",borderRadius:8,overflow:"hidden",marginBottom:20}}>
              <div style={{background:"#b91c1c",color:"white",padding:"8px 16px",fontSize:13,fontWeight:700}}>Ⅱ. 옥내소화전설비 계산 (NFTC 102)</div>
              <div style={{padding:"14px 16px"}}>
                <table style={{width:"100%",borderCollapse:"collapse",fontSize:12}}>
                  <thead><tr style={{background:"#fef2f2"}}>
                    {["기호","항목","수치","단위","산출근거"].map(h=><th key={h} style={{border:BD,padding:"6px 10px",textAlign:"center",fontWeight:700,color:"#b91c1c"}}>{h}</th>)}
                  </tr></thead>
                  <tbody>
                    {[
                      ["A","최대구역 소화전 수",H.A,"개",`최대 5개 이하 — ${H.A}개 적용`],
                      ["B","소화전 개당 방사량",FLOW_PER_HYDRANT,"ℓ/min","NFTC 102 §2.2.1.3 (130 ℓ/min 고정)"],
                      ["C","펌프 토출량",H.Clpm,"ℓ/min",`C = A×B = ${H.A}×${FLOW_PER_HYDRANT}`],
                      ["D","수원 용량",`${f3(H.D)}`,"m³",`D = ${H.A}×130×20÷1000 = ${f3(H.D)} m³`],
                      ["E","실양정 (h₁)",ff(H.E),"m","설계 도면 기준"],
                      ["F","배관 마찰손실 (h₂)",f3(H.F),"m","Hazen-Williams 공식"],
                      ["G","호스 마찰손실 (h₃)",f3(H.G),"m",`${H.hose.label}`],
                      ["H₄","노즐 환산수두",H_NOZZLE,"m","방수압 0.17 MPa 환산"],
                      ["I","안전율",f3(H.I),"m","(E+F+G+H₄)×10%"],
                      ["J","전양정",H.J,"m","올림 적용"],
                    ].map(([no,lbl,val,unit,bas])=>(
                      <tr key={no} style={{background:"white"}}>
                        <td style={{border:BD,padding:"5px 10px",textAlign:"center",fontWeight:700,fontFamily:"'Noto Sans Mono',monospace",color:"#b91c1c",width:36}}>{no}</td>
                        <td style={{border:BD,padding:"5px 12px",fontSize:11}}>{lbl}</td>
                        <td style={{border:BD,padding:"5px 12px",textAlign:"right",fontFamily:"'Noto Sans Mono',monospace",fontWeight:700}}>{val}</td>
                        <td style={{border:BD,padding:"5px 8px",textAlign:"center",fontSize:11,color:"#6b7280"}}>{unit}</td>
                        <td style={{border:BD,padding:"5px 12px",fontSize:10,color:"#6b7280"}}>{bas}</td>
                      </tr>
                    ))}
                  </tbody>
                </table>
              </div>
            </div>

            {/* ※ 배관 및 관부속 마찰손실 수두 상세표 — 간이스프링클러 */}
            <div className="print-section" style={{marginBottom:18}}>
              <div style={{fontWeight:700,fontSize:11,marginBottom:7,color:"#374151",borderLeft:"3px solid #b45309",paddingLeft:10}}>
                ※ 배관 및 관부속 마찰손실 수두 상세표 【 간이스프링클러 】 &nbsp;[ h₂ = {f3(SP.F)} m &nbsp;|&nbsp; 배관종류 : {PIPE_CONFIG[spSys.pipeType]?.shortLabel}, C = {PIPE_CONFIG[spSys.pipeType]?.C} ]
              </div>
              <table style={{width:"100%",borderCollapse:"collapse",fontSize:10}}>
                <thead>
                  <tr style={{background:"#b45309",color:"white"}}>
                    {["NO","유량\n(ℓ/min)","관경\n(A)","직관\n(m)","90°Elbow\n수량(상당직관)","45°Elbow\n수량(상당직관)","분류Tee\n수량(상당직관)","직류Tee\n수량(상당직관)","Gate V/V\n수량(상당직관)","Ball V/V\n수량(상당직관)","Angle V/V\n수량(상당직관)","Check V/V\n수량(상당직관)","상당직관\n합계(m)","마찰계수\n(m/100m)","손실수두\n(m)"].map((h,i)=>(
                      <th key={i} style={{border:BD,padding:"4px 3px",textAlign:"center",whiteSpace:"pre-line",lineHeight:1.3,fontSize:8,fontWeight:700}}>{h}</th>
                    ))}
                  </tr>
                </thead>
                <tbody>
                  {spSegs.map((s,i)=>{
                    const eq=FITTING_EQ[s.dia]||FITTING_EQ[100];
                    const counts=[s.e90,s.e45,s.teeB,s.teeS,s.gate,s.ball,s.angle,s.check];
                    const fl=counts.reduce((sum,cnt,j)=>sum+cnt*eq[j],0);
                    const tl=(s.len||0)+fl;
                    const fric=calcFriction(s.flow,s.dia,spSys.pipeType);
                    const hl=fric*tl/100;
                    return <tr key={i} style={{background:i%2===0?"white":"#f9fafb"}}>
                      <td style={{border:BD,padding:"3px 4px",textAlign:"center",fontFamily:"'Noto Sans Mono',monospace",fontSize:10}}>{i+1}</td>
                      <td style={{border:BD,padding:"3px 4px",textAlign:"center",fontFamily:"'Noto Sans Mono',monospace",fontSize:10}}>{s.flow}</td>
                      <td style={{border:BD,padding:"3px 4px",textAlign:"center",fontFamily:"'Noto Sans Mono',monospace",fontSize:10}}>{s.dia}</td>
                      <td style={{border:BD,padding:"3px 4px",textAlign:"center",fontFamily:"'Noto Sans Mono',monospace",fontSize:10}}>{s.len}</td>
                      {counts.map((cnt,j)=>(
                        <td key={j} style={{border:BD,padding:"2px 3px",textAlign:"center",fontSize:9,lineHeight:1.3}}>
                          <div style={{fontFamily:"'Noto Sans Mono',monospace",fontWeight:700,fontSize:10}}>{cnt}</div>
                          <div style={{fontFamily:"'Noto Sans Mono',monospace",fontSize:8,color:"#6b7280"}}>({f3(eq[j])})</div>
                        </td>
                      ))}
                      <td style={{border:BD,padding:"3px 4px",textAlign:"center",fontFamily:"'Noto Sans Mono',monospace",fontSize:10}}>{f3(fl)}</td>
                      <td style={{border:BD,padding:"3px 4px",textAlign:"center",fontFamily:"'Noto Sans Mono',monospace",fontSize:10,color:"#c2410c",fontWeight:700}}>{f3(fric)}</td>
                      <td style={{border:BD,padding:"3px 4px",textAlign:"center",fontFamily:"'Noto Sans Mono',monospace",fontSize:10,color:"#1d4ed8",fontWeight:700}}>{f3(hl)}</td>
                    </tr>;
                  })}
                  <tr style={{background:"#fffbeb",fontWeight:700}}>
                    <td colSpan={14} style={{border:BD,padding:"4px 8px",textAlign:"right",color:"#7c2d12",fontSize:10}}>합계 (h₂)</td>
                    <td style={{border:BD,padding:"4px 6px",textAlign:"right",fontFamily:"'Noto Sans Mono',monospace",color:"#b45309",fontWeight:900,fontSize:11}}>{f3(SP.F)}</td>
                  </tr>
                </tbody>
              </table>
            </div>

            {/* ※ 배관 및 관부속 마찰손실 수두 상세표 — 옥내소화전 */}
            <div className="print-section" style={{marginBottom:18}}>
              <div style={{fontWeight:700,fontSize:11,marginBottom:7,color:"#374151",borderLeft:"3px solid #b91c1c",paddingLeft:10}}>
                ※ 배관 및 관부속 마찰손실 수두 상세표 【 옥내소화전 】 &nbsp;[ h₂ = {f3(H.F)} m &nbsp;|&nbsp; 배관종류 : {PIPE_CONFIG[hSys.pipeType]?.shortLabel}, C = {PIPE_CONFIG[hSys.pipeType]?.C} ]
              </div>
              <table style={{width:"100%",borderCollapse:"collapse",fontSize:10}}>
                <thead>
                  <tr style={{background:"#b91c1c",color:"white"}}>
                    {["NO","유량\n(ℓ/min)","관경\n(A)","직관\n(m)","90°Elbow\n수량(상당직관)","45°Elbow\n수량(상당직관)","분류Tee\n수량(상당직관)","직류Tee\n수량(상당직관)","Gate V/V\n수량(상당직관)","Ball V/V\n수량(상당직관)","Angle V/V\n수량(상당직관)","Check V/V\n수량(상당직관)","상당직관\n합계(m)","마찰계수\n(m/100m)","손실수두\n(m)"].map((h,i)=>(
                      <th key={i} style={{border:BD,padding:"4px 3px",textAlign:"center",whiteSpace:"pre-line",lineHeight:1.3,fontSize:8,fontWeight:700}}>{h}</th>
                    ))}
                  </tr>
                </thead>
                <tbody>
                  {hSegs.map((s,i)=>{
                    const eq=FITTING_EQ[s.dia]||FITTING_EQ[100];
                    const counts=[s.e90,s.e45,s.teeB,s.teeS,s.gate,s.ball,s.angle,s.check];
                    const fl=counts.reduce((sum,cnt,j)=>sum+cnt*eq[j],0);
                    const tl=(s.len||0)+fl;
                    const fric=calcFriction(s.flow,s.dia,hSys.pipeType);
                    const hl=fric*tl/100;
                    return <tr key={i} style={{background:i%2===0?"white":"#f9fafb"}}>
                      <td style={{border:BD,padding:"3px 4px",textAlign:"center",fontFamily:"'Noto Sans Mono',monospace",fontSize:10}}>{i+1}</td>
                      <td style={{border:BD,padding:"3px 4px",textAlign:"center",fontFamily:"'Noto Sans Mono',monospace",fontSize:10}}>{s.flow}</td>
                      <td style={{border:BD,padding:"3px 4px",textAlign:"center",fontFamily:"'Noto Sans Mono',monospace",fontSize:10}}>{s.dia}</td>
                      <td style={{border:BD,padding:"3px 4px",textAlign:"center",fontFamily:"'Noto Sans Mono',monospace",fontSize:10}}>{s.len}</td>
                      {counts.map((cnt,j)=>(
                        <td key={j} style={{border:BD,padding:"2px 3px",textAlign:"center",fontSize:9,lineHeight:1.3}}>
                          <div style={{fontFamily:"'Noto Sans Mono',monospace",fontWeight:700,fontSize:10}}>{cnt}</div>
                          <div style={{fontFamily:"'Noto Sans Mono',monospace",fontSize:8,color:"#6b7280"}}>({f3(eq[j])})</div>
                        </td>
                      ))}
                      <td style={{border:BD,padding:"3px 4px",textAlign:"center",fontFamily:"'Noto Sans Mono',monospace",fontSize:10}}>{f3(fl)}</td>
                      <td style={{border:BD,padding:"3px 4px",textAlign:"center",fontFamily:"'Noto Sans Mono',monospace",fontSize:10,color:"#c2410c",fontWeight:700}}>{f3(fric)}</td>
                      <td style={{border:BD,padding:"3px 4px",textAlign:"center",fontFamily:"'Noto Sans Mono',monospace",fontSize:10,color:"#1d4ed8",fontWeight:700}}>{f3(hl)}</td>
                    </tr>;
                  })}
                  <tr style={{background:"#fef3c7",fontWeight:700}}>
                    <td colSpan={14} style={{border:BD,padding:"4px 8px",textAlign:"right",color:"#92400e",fontSize:10}}>합계 (h₂)</td>
                    <td style={{border:BD,padding:"4px 6px",textAlign:"right",fontFamily:"'Noto Sans Mono',monospace",color:"#b45309",fontWeight:900,fontSize:11}}>{f3(H.F)}</td>
                  </tr>
                </tbody>
              </table>
            </div>

            {/* Ⅲ. 겸용 펌프 선정 결과 */}
            <div className="page-break print-section" style={{border:"2px solid #1d4ed8",borderRadius:8,overflow:"hidden",marginBottom:20}}>
              <div style={{background:"#1d4ed8",color:"white",padding:"8px 16px",fontSize:13,fontWeight:700}}>Ⅲ. 겸용 펌프 선정 결과 (NFTC 103A + NFTC 102)</div>
              <div style={{padding:"14px 16px"}}>
                {/* 설계 기준 박스 */}
                <div style={{background:"#eff6ff",border:"1px solid #bfdbfe",borderRadius:8,padding:"10px 14px",marginBottom:12,fontSize:11,color:"#1e40af",lineHeight:2}}>
                  <b>【 겸용 설계 기준 적용 】</b><br/>
                  ① 토출량 = 간이스프링클러({SP.Clpm} ℓ/min) + 옥내소화전({H.Clpm} ℓ/min) = <b>{CP.Clpm} ℓ/min = {f3(CP.M)} m³/min</b><br/>
                  ② 전양정 = max(간이스프링클러 {SP.J}m, 옥내소화전 {H.J}m) → <b>{CP.J} m</b> ({CP.hHead} 기준 채택)<br/>
                  ③ 수원 = 간이스프링클러({f3(SP.D)} m³) + 옥내소화전({f3(H.D)} m³) = <b>{f3(CP.D)} m³</b>
                </div>
                <table style={{width:"100%",borderCollapse:"collapse",fontSize:10,marginBottom:12,tableLayout:"fixed"}}>
                  <colgroup>
                    <col style={{width:"12%"}}/><col style={{width:"8%"}}/><col style={{width:"10%"}}/><col style={{width:"8%"}}/>
                    <col style={{width:"8%"}}/><col style={{width:"8%"}}/><col style={{width:"16%"}}/><col style={{width:"10%"}}/><col style={{width:"10%"}}/>
                  </colgroup>
                  <thead>
                    <tr style={{background:"#1d4ed8",color:"white"}}>
                      {["구분","구경(A)","합산유량\n(m³/min)","동력\n(HP)","전양정\n(m)","수원\n(m³)","전달방식","펌프효율\n(η%)","헤드수/소화전수"].map(h=>(
                        <th key={h} style={{border:BD,padding:"5px 4px",textAlign:"center",fontWeight:700,fontSize:10,whiteSpace:"pre-line",lineHeight:1.3}}>{h}</th>
                      ))}
                    </tr>
                  </thead>
                  <tbody>
                    <tr style={{fontWeight:700,background:"white"}}>
                      {["겸용펌프",`${cPump.pumpDia}A`,f3(CP.M),CP.Php,CP.J,f3(CP.D),(TRANS_TYPE[cPump.transType]&&TRANS_TYPE[cPump.transType].label),`${cPump.pumpEff}%`,`${SP.A}개/${H.A}개`].map((v,i)=>(
                        <td key={i} style={{border:BD,padding:"6px 4px",textAlign:"center",fontFamily:"'Noto Sans Mono','Noto Sans KR',monospace",fontSize:10,wordBreak:"keep-all"}}>{v}</td>
                      ))}
                    </tr>
                  </tbody>
                </table>
                <div style={{textAlign:"center",fontSize:16,fontWeight:900,color:"#1d4ed8",letterSpacing:"0.04em",borderTop:"1px solid #bfdbfe",paddingTop:12,fontFamily:"'Noto Sans Mono','Noto Sans KR',monospace"}}>
                  Q = {f3(CP.M)} ㎥/min &nbsp;×&nbsp; H = {CP.J} m &nbsp;×&nbsp; P = {CP.Php} HP
                </div>
              </div>
            </div>

            {/* 적용 법령 */}
            <div className="print-section" style={{padding:13,background:"#f8fafc",borderRadius:8,fontSize:11,color:"#6b7280",border:BD,lineHeight:1.9}}>
              <b style={{color:"#374151"}}>▣ 적용 법령 및 기준</b><br/>
              ① 화재안전기준 NFPC 103A (간이스프링클러설비) / NFTC 103A [국립소방연구원공고 제2024-58호, 2024. 12. 1.]<br/>
              &nbsp;&nbsp;- §2.1.1.2(수원): 헤드수×방사량×시간÷1000 &nbsp;|&nbsp; §2.2.1(방수압·방수량): 0.1 MPa 이상, 50 ℓ/min 이상<br/>
              ② 화재안전기준 NFPC 102 (옥내소화전설비) / NFTC 102 (2022.12.01. 시행)<br/>
              &nbsp;&nbsp;- 제5조(수원): N개×2.6 m³ 이상 &nbsp;|&nbsp; 제6조(가압송수장치): 방수압 0.17~0.7 MPa, 방수량 130 ℓ/min 이상<br/>
              ③ 겸용 펌프 설계 원칙: 토출량 합산 / 전양정 최댓값 채택 / 수원 합산<br/>
              ④ 배관 마찰손실: Hazen-Williams 공식 적용
            </div>

            <div id="dev-stamp" style={{fontFamily:"'Orbitron',sans-serif",fontWeight:700,letterSpacing:"0.08em"}}>MANMIN · Ver-2.0</div>
          </div>
        </>}

      </div>
    </div>
  </div>

  {showInstallBanner&&<div style={{position:"fixed",bottom:16,left:16,right:16,zIndex:9999}} className="pwa-install-banner"><div style={{borderRadius:16,padding:16,display:"flex",alignItems:"center",gap:12}}><img src="icons/icon-192.png" style={{width:48,height:48,borderRadius:12,flexShrink:0,boxShadow:"0 4px 12px rgba(0,0,0,0.3)"}} alt=""/><div style={{flex:1,minWidth:0}}><div style={{color:"white",fontSize:13,fontWeight:800}}>홈 화면에 설치하시겠습니까?</div><div style={{color:"#c4b5fd",fontSize:10,fontWeight:600,marginTop:4}}>오프라인에서도 사용 가능합니다</div></div><div style={{display:"flex",gap:8,flexShrink:0}}><button onClick={()=>setShowInstallBanner(false)} style={{color:"rgba(255,255,255,0.6)",fontSize:11,fontWeight:700,padding:"8px 12px",border:"none",background:"transparent",cursor:"pointer",borderRadius:8}}>닫기</button><button onClick={handleInstall} style={{background:"white",color:"#7c3aed",fontSize:11,fontWeight:900,padding:"8px 16px",border:"none",borderRadius:8,cursor:"pointer",boxShadow:"0 2px 8px rgba(0,0,0,0.2)"}}>설치</button></div></div></div>}

  {/* ══ 계산식 안내 FAB ══ */}
  <button className="formula-fab no-print" onClick={()=>setShowFormula(true)} aria-label="계산식 안내 열기">
    <span style={{fontSize:20,lineHeight:1}}>📐</span>
    <span style={{fontSize:10,fontWeight:800,letterSpacing:"0.04em"}}>계산식</span>
    <span style={{fontSize:9,opacity:0.75}}>안내</span>
  </button>

  {/* ══ 계산식 안내 모달 ══ */}
  {showFormula && <FormulaModal onClose={()=>setShowFormula(false)}/>}

  </>;
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
<script>if('serviceWorker' in navigator){window.addEventListener('load',()=>{navigator.serviceWorker.register('./sw.js').then(r=>console.log('[PWA]',r.scope)).catch(e=>console.warn(e));});}</script>
</body>
</html>
